<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>X → Raindrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      background: #0f1117;
      color: #e7e9ea;
    }
    h1 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #1d2433;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok { background: #00ba7c; }
    .dot.ng { background: #f4212e; }
    .count-box {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      background: #1d2433;
      margin-bottom: 12px;
    }
    .count { font-size: 36px; font-weight: 700; color: #1d9bf0; }
    .count-label { font-size: 12px; color: #71767b; margin-top: 4px; }
    a {
      display: block;
      text-align: center;
      padding: 9px;
      border-radius: 6px;
      background: #1d9bf0;
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    a:hover { background: #1a8cd8; }
  </style>
</head>
<body>
  <h1>X Likes → Raindrop</h1>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">確認中...</span>
  </div>
  <div class="count-box">
    <div class="count" id="today-count">0</div>
    <div class="count-label">今日の同期数</div>
  </div>
  <a href="options.html" target="_blank">設定を開く</a>
  <script src="popup.js"></script>
</body>
</html>
